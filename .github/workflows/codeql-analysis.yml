name: "CodeQL Security Analysis"

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '30 3 * * 5'  # Every Friday at 3:30 AM UTC

jobs:
  analyze:
    name: Security Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        # Adicionar queries para Discord bot e Node.js
        queries: security-extended,security-and-quality

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build for analysis
      run: |
        # Verificar sintaxe dos principais arquivos
        node -c index.js
        node -c dashboard/index.js
        find . -name "*.js" -not -path "./node_modules/*" -not -path "./.git/*" -exec node -c {} \; 2>/dev/null || echo "Some files have syntax issues"

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
