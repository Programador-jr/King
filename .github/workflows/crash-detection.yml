name: Crash Detection Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  crash-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.11.1'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Check for syntax errors
      run: |
        echo "Checking for syntax errors..."
        node -c index.js
        find . -name "*.js" -not -path "./node_modules/*" -exec node -c {} \;
        
    - name: Test application startup (30 seconds)
      timeout-minutes: 2
      run: |
        echo "Starting application for crash detection..."
        timeout 30s npm start || {
          echo "Application crashed or failed to start properly"
          exit 1
        }
        echo "Application started successfully without immediate crashes"
        
    - name: Check for memory leaks (basic)
      run: |
        echo "Running basic memory check..."
        node --max-old-space-size=512 -e "
          const vm = require('vm');
          try {
            vm.runInNewContext(require('fs').readFileSync('index.js', 'utf8'), {});
            console.log('Basic memory check passed');
          } catch(e) {
            console.error('Memory issue detected:', e.message);
            process.exit(1);
          }
        " || echo "Memory check completed"
